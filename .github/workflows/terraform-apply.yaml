name: Terraform Apply
run-name: >
  Terraform Apply by ${{ github.actor }} on ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment to deploy
        type: environment
        required: true

concurrency:
  group: terraform-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write      # needed for OIDC
  contents: read       # needed for checkout / Terraform

jobs:
  terraform-deploy-platform:
    name: Deploy
    uses: subhamay-bhattacharyya-gha/tf-deploy-multi-reusable-wf/.github/workflows/terraform-deploy.yaml@bug/GHA-0027-bug-heredoc-write-of-snow
    with:
      cloud-provider: platform
      tflint-ver: ${{ vars.TF_LINT_VER }}
      backend-type: remote
      tf-vars-file: environments/${{ github.event.inputs.environment }}/terraform.tfvars
    secrets:
      tfc-token: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO_SNOWFLAKE_ORG }}

  deploy-streamlit-app:
    name: Deploy Streamlit App
    needs: terraform-deploy-platform
    uses: ./.github/workflows/deploy-streamlit-app.yaml
    with:
      environment: ${{ github.event.inputs.environment }}
    secrets: inherit
